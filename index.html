<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentimentAI | Akıllı Yorum Analizi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Poiret+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Arka plan animasyon katmanı -->
    <div id="bg-canvas"></div>

    <div class="main-container">
        <header class="app-header">
            <div class="logo-icon"><i class="fas fa-brain-circuit"></i></div>
            <h1>AkıllıYorum<span>AnalizI</span></h1>
            <p>Yapay zeka ile metnin duygusunu ve nezaketini tespit edin.</p>
        </header>

        <main class="analysis-section">
            <div class="glass-card input-card">
                <div class="input-wrapper">
                    <textarea id="comment-input" placeholder="Analiz edilecek metni buraya bırakın..."></textarea>
                    <div class="char-count">0 / 500</div>
                </div>
                
                <div class="action-bar">
                    <div class="quick-tags">
                        <span>#DuyguAnalizi</span>
                        <span>#NLP</span>
                    </div>
                    <button id="analyze-btn" onclick="analizEt()">
                        <span id="btn-text">Analizi Başlat</span>
                        <i class="fas fa-sparkles"></i>
                        <div id="loader" class="loader hidden"></div>
                    </button>
                </div>
            </div>

            <!-- Sonuç Alanı -->
            <div id="result-container" class="glass-card result-card hidden">
                <div class="result-header">
                    <h2><i class="fas fa-chart-pie"></i> Analiz Raporu</h2>
                </div>
                
                <div class="results-grid">
                    <div class="result-item" id="sentiment-box">
                        <div class="item-info">
                            <h3>DUYGU DURUMU</h3>
                            <span id="sentiment-percent" class="percent-badge">0%</span>
                        </div>
                        <div class="status-display">
                            <i id="sentiment-icon" class="fas fa-smile"></i>
                            <p id="sentiment-label">Pozitif</p>
                        </div>
                        <div class="score-bar-bg">
                            <div id="sentiment-score-bar" class="score-bar"></div>
                        </div>
                    </div>

                    <div class="result-item" id="toxicity-box">
                        <div class="item-info">
                            <h3>GÜVENLİK (TOKSİKLİK)</h3>
                            <span id="toxicity-percent" class="percent-badge">0%</span>
                        </div>
                        <div class="status-display">
                            <i id="toxicity-icon" class="fas fa-shield-check"></i>
                            <p id="toxicity-label">Güvenli</p>
                        </div>
                        <div class="score-bar-bg">
                            <div id="toxicity-score-bar" class="score-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="summary-box">
                    <p id="result-text-summary">Analiz yapılıyor...</p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>© 2026 • Gücünü Cloud NLP'den alır</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
